<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Viewer for Zoho CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #bababa; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#f0f2f5] h-screen flex flex-col font-sans text-[#111b21] overflow-hidden">

    <div class="flex flex-1 h-full w-full bg-[#eae6df] overflow-hidden">
        
        <div class="w-1/3 bg-white border-r border-[#e9edef] flex flex-col h-full">
            <div class="bg-[#f0f2f5] p-4 flex items-center justify-between border-b border-[#e9edef]">
                <h2 class="text-lg font-bold text-[#008069]">WhatsApp Chats</h2>
            </div>
            
            <div id="chats-list" class="flex-1 overflow-y-auto custom-scrollbar bg-white">
                <div class="p-4 text-center text-gray-500" id="loading-spinner">Connecting to Zoho CRM...</div>
            </div>

            <div class="border-t border-gray-200 bg-gray-50 p-2 text-xs">
                <details class="cursor-pointer">
                    <summary class="font-semibold text-gray-700 select-none">🛠️ System Connection Logs</summary>
                    <div class="mt-2 space-y-1 font-mono text-[10px] text-gray-600 bg-white p-2 border rounded max-h-32 overflow-y-auto" id="diagnostic-logs">
                    </div>
                </details>
            </div>
        </div>

        <div class="w-2/3 flex flex-col h-full bg-[#efeae2] relative" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; opacity: 0.99;">
            
            <div class="bg-[#f0f2f5] px-4 py-3 flex items-center border-b border-[#e9edef] z-10 w-full">
                <div class="ml-2">
                    <p id="active-chat-name" class="font-semibold text-gray-800">Select a conversation to start reading</p>
                    <p id="active-chat-status" class="text-xs text-gray-500"></p>
                </div>
            </div>

            <div id="message-container" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-3 custom-scrollbar">
                <div class="m-auto text-center text-gray-500 bg-white bg-opacity-80 px-4 py-2 rounded-lg shadow-sm">
                    Select a conversation from the sidebar layout.
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            CONVERSATIONS_MODULE: "Conversations",         
            MESSAGES_MODULE: "conversation_messages",     
            CONTACTS_LOOKUP_IN_CONV: "Contact",            
            CONV_LOOKUP_IN_MSG: "Conversation",
            
            // Настройки Wasabi S3
            S3_BASE_URL: "https://s3.eu-central-1.wasabisys.com/in-files",
            S3_FOLDER: "8613600474325" // Статическая папка вашего WhatsApp-канала
        };

        let currentContactId = null;
        let handshakeCompleted = false;

        function logDebug(message, type = "info") {
            const logsDiv = document.getElementById('diagnostic-logs');
            if (logsDiv) {
                const color = type === "error" ? "text-red-600 font-bold" : type === "success" ? "text-green-600 font-semibold" : "text-gray-500";
                logsDiv.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${message}</div>`;
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        }

        function initializeWidget(entityId) {
            if (handshakeCompleted) return;
            handshakeCompleted = true;
            currentContactId = entityId;
            logDebug(`Target Contact ID Resolved: ${currentContactId}`, "success");
            loadConversations(currentContactId);
        }

        logDebug("Widget loaded. Starting Zoho Handshake...");
        
        // Сценарий 1: Стандартное событие PageLoad
        ZOHO.embeddedApp.on("PageLoad", function(data) {
            logDebug("Zoho PageLoad event triggered.");
            if (data && data.EntityId) {
                let id = Array.isArray(data.EntityId) ? data.EntityId[0] : data.EntityId;
                if (id) {
                    initializeWidget(id);
                }
            }
        });

        ZOHO.embeddedApp.init();

        // Сценарий 2: Резервный Fallback (всегда страхует от зависания "Connecting...")
        setTimeout(() => {
            if (!handshakeCompleted) {
                logDebug("PageLoad event missed. Attempting getPageInfo fallback...");
                ZOHO.CRM.INTERACTION.getPageInfo()
                    .then(function(data) {
                        if (data && data.recordId) {
                            logDebug("Fallback successful! Retrieved ID via current page info.", "success");
                            initializeWidget(data.recordId);
                        } else {
                            logDebug("Fallback failed: Page info context is empty.", "error");
                        }
                    })
                    .catch(function(err) {
                        logDebug("Fallback error during interaction: " + JSON.stringify(err), "error");
                    });
            }
        }, 1200);

        // 1. Поиск диалогов (Левая панель)
        function loadConversations(contactId) {
            const chatListDiv = document.getElementById('chats-list');
            chatListDiv.innerHTML = `<div class="p-4 text-center text-gray-400">Searching conversations...</div>`;
            
            const searchParams = {
                Entity: CONFIG.CONVERSATIONS_MODULE,
                Type: "criteria",
                Query: `(${CONFIG.CONTACTS_LOOKUP_IN_CONV}:equals:${contactId})`
            };
            logDebug(`Searching conversations: (${CONFIG.CONTACTS_LOOKUP_IN_CONV}:equals:${contactId})`);

            ZOHO.CRM.API.searchRecord(searchParams)
                .then(function(response) {
                    chatListDiv.innerHTML = "";
                    
                    if (!response || !response.data || response.data.length === 0 || response.status === "error") {
                        chatListDiv.innerHTML = `<div class="p-4 text-center text-gray-400">No chats found for this contact.</div>`;
                        logDebug("No conversation records found.", "info");
                        return;
                    }

                    logDebug(`Found ${response.data.length} chat(s). Sorting...`, "success");
                    
                    const sortedChats = response.data.sort((a, b) => {
                        return new Date(b.Modified_Time || 0) - new Date(a.Modified_Time || 0);
                    });

                    sortedChats.forEach(chat => {
                        const dateStr = chat.Modified_Time ? new Date(chat.Modified_Time).toLocaleDateString() : '';
                        const chatEl = document.createElement('div');
                        chatEl.className = "flex items-center justify-between p-4 border-b border-[#f0f2f5] hover:bg-[#f0f2f5] cursor-pointer transition";
                        
                        chatEl.onclick = () => selectConversation(chat.id, chat.Name);
                        
                        chatEl.innerHTML = `
                            <div class="flex-1 min-w-0 pr-2">
                                <p class="font-bold text-[#111b21] truncate text-sm">${chat.Name || 'WhatsApp Chat'}</p>
                                <p class="text-[11px] text-[#008069] truncate font-medium mt-0.5">${chat.Messager_Chat_ID || 'No Chat ID'}</p>
                                <p class="text-[9px] text-gray-400 truncate">ID: ${chat.id}</p>
                            </div>
                            <span class="text-[11px] text-gray-400 self-start whitespace-nowrap mt-1">${dateStr}</span>
                        `;
                        chatListDiv.appendChild(chatEl);
                    });
                })
                .catch(err => {
                    logDebug(`Search Error: ${JSON.stringify(err)}`, "error");
                    showDiagnosticError(chatListDiv, "Conversations Search", err, JSON.stringify(searchParams));
                });
        }

        // 2. Поиск сообщений выбранного чата (Правая панель)
        function selectConversation(conversationId, name) {
            document.getElementById('active-chat-name').innerText = name || "WhatsApp Chat";
            document.getElementById('active-chat-status').innerText = "Streaming records...";
            const messageContainer = document.getElementById('message-container');
            messageContainer.innerHTML = `<div class="m-auto text-gray-500">Loading messages...</div>`;

            const searchParams = {
                Entity: CONFIG.MESSAGES_MODULE,
                Type: "criteria",
                Query: `(${CONFIG.CONV_LOOKUP_IN_MSG}:equals:${conversationId})`
            };
            logDebug(`Searching messages for Conversation ID: ${conversationId}`);

            ZOHO.CRM.API.searchRecord(searchParams)
                .then(function(response) {
                    messageContainer.innerHTML = "";
                    document.getElementById('active-chat-status').innerText = "";

                    if (!response || !response.data || response.data.length === 0 || response.status === "error") {
                        messageContainer.innerHTML = `<div class="m-auto text-gray-400">No message items found.</div>`;
                        return;
                    }

                    logDebug(`Loaded ${response.data.length} messages. Sorting...`, "success");
                    
                    const sortedMessages = response.data.sort((a, b) => {
                        return new Date(a.Created_Time || 0) - new Date(b.Created_Time || 0);
                    });

                    sortedMessages.forEach(msg => {
                        const isIncoming = msg.Direction && String(msg.Direction).toLowerCase().includes('in'); 
                        const bubbleWrapper = document.createElement('div');
                        bubbleWrapper.className = `flex w-full ${isIncoming ? 'justify-start' : 'justify-end'}`;

                        const bubble = document.createElement('div');
                        bubble.className = `max-w-[70%] rounded-lg px-3 py-2 shadow-sm text-sm relative flex flex-col ${
                            isIncoming 
                                ? 'bg-white text-[#111b21] rounded-tl-none' 
                                : 'bg-[#d9fdd3] text-[#111b21] rounded-tr-none'
                        }`;

                        // Текст сообщения
                        const messageText = msg.Message_Body || "";
                        let contentHtml = `<p class="whitespace-pre-wrap break-words leading-relaxed">${messageText}</p>`;
                        
                        // Контейнер под ссылки на файлы
                        contentHtml += `<div id="attachments-${msg.id}" class="mt-2 flex flex-col gap-1.5 w-full"></div>`;
                        
                        const timeStr = msg.Created_Time ? new Date(msg.Created_Time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                        contentHtml += `
                            <span class="text-[10px] text-gray-500 self-end mt-1 select-none whitespace-nowrap">
                                ${timeStr}
                            </span>
                        `;

                        bubble.innerHTML = contentHtml;
                        bubbleWrapper.appendChild(bubble);
                        messageContainer.appendChild(bubbleWrapper);

                        // Поиск связанных файлов
                        renderAttachmentLinks(msg.id);
                    });

                    messageContainer.scrollTop = messageContainer.scrollHeight;
                })
                .catch(err => {
                    logDebug(`Message Search Error: ${JSON.stringify(err)}`, "error");
                    showDiagnosticError(messageContainer, "Messages Search Feed", err, JSON.stringify(searchParams));
                });
        }

        // 3. Поиск связанных вложений и генерация прямой ссылки Wasabi S3
        function renderAttachmentLinks(messageId) {
            ZOHO.CRM.API.getRelatedRecords({
                Entity: CONFIG.MESSAGES_MODULE,
                RecordID: messageId,
                RelatedList: "Attachments",
                page: 1,
                per_page: 5
            })
            .then(function(response) {
                const container = document.getElementById(`attachments-${messageId}`);
                if (!container) return;

                if (response && response.data && response.data.length > 0) {
                    container.innerHTML = ""; // Очищаем контейнер
                    
                    response.data.forEach(attachment => {
                        const fileName = attachment.File_Name || attachment.file_Name || "Attachment";
                        
                        // Конструируем прямую ссылку на Wasabi S3 по статическому шаблону
                        const s3Url = `${CONFIG.S3_BASE_URL}/${CONFIG.S3_FOLDER}/${fileName}`;
                        
                        const linkEl = document.createElement('a');
                        linkEl.href = s3Url;
                        linkEl.target = "_blank"; // Открываем в новой вкладке
                        linkEl.className = "inline-flex items-center gap-2 bg-black bg-opacity-5 hover:bg-opacity-10 px-2.5 py-2 rounded border border-gray-200 transition-all self-start text-xs font-semibold text-[#008069] max-w-full mt-1";
                        
                        linkEl.innerHTML = `
                            <svg class="w-3.5 h-3.5 flex-shrink-0 text-[#008069]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                            </svg>
                            <span class="truncate max-w-[220px]" title="${fileName}">${fileName}</span>
                        `;
                        container.appendChild(linkEl);
                    });
                }
            })
            .catch(function(err) {
                // Если файлов нет, Zoho отдаст ошибку 204. Безопасно очищаем блок.
                const container = document.getElementById(`attachments-${messageId}`);
                if (container) container.innerHTML = ""; 
            });
        }

        function showDiagnosticError(targetElement, contextName, errorObj, attemptedQuery) {
            targetElement.innerHTML = `
                <div class="p-4 m-2 bg-red-50 border border-red-200 rounded-lg text-red-700 text-xs">
                    <p class="font-bold text-sm mb-1">⚠️ Error querying ${contextName}</p>
                    <pre class="bg-red-100 p-2 rounded overflow-auto max-h-32 font-mono text-[10px]">${JSON.stringify(errorObj, null, 2)}</pre>
                    <p class="font-semibold mt-2">Executed Query Parameters:</p>
                    <pre class="bg-gray-100 p-2 rounded overflow-auto font-mono text-[10px] text-gray-600 whitespace-pre-wrap">${attemptedQuery}</pre>
                </div>`;
        }
    </script>
</body>
</html>
