<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Viewer for Zoho CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #bababa; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#f0f2f5] h-screen flex flex-col font-sans text-[#111b21] overflow-hidden">

    <div class="flex flex-1 h-full w-full bg-[#eae6df] overflow-hidden">
        
        <div class="w-1/3 bg-white border-r border-[#e9edef] flex flex-col h-full">
            <div class="bg-[#f0f2f5] p-4 flex items-center justify-between border-b border-[#e9edef]">
                <h2 class="text-lg font-bold text-[#008069]">WhatsApp Chats</h2>
            </div>
            <div id="chats-list" class="flex-1 overflow-y-auto custom-scrollbar bg-white">
                <div class="p-4 text-center text-gray-500">Loading chats...</div>
            </div>
        </div>

        <div class="w-2/3 flex flex-col h-full bg-[#efeae2] relative" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; opacity: 0.99;">
            
            <div class="bg-[#f0f2f5] px-4 py-3 flex items-center border-b border-[#e9edef] z-10 w-full">
                <div class="ml-2">
                    <p id="active-chat-name" class="font-semibold text-gray-800">Select a conversation to start reading</p>
                    <p id="active-chat-status" class="text-xs text-gray-500"></p>
                </div>
            </div>

            <div id="message-container" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-3 custom-scrollbar">
                <div class="m-auto text-center text-gray-500 bg-white bg-opacity-80 px-4 py-2 rounded-lg shadow-sm">
                    Select a conversation from the sidebar.
                </div>
            </div>
        </div>
    </div>

    <script>
        // MATCHED TO YOUR CRM API NAMES
        const CONFIG = {
            CONVERSATIONS_MODULE: "CustomModule1",      // Conversations
            MESSAGES_MODULE: "CustomModule2",           // Conersation Messages
            CONTACTS_LOOKUP_IN_CONV: "Contact",         // Field linking CustomModule1 -> Contacts
            CONV_LOOKUP_IN_MSG: "Conversation_link"     // Field linking CustomModule2 -> CustomModule1
        };

        let currentContactId = null;

        // Initialize Zoho Embedded App
        ZOHO.embeddedApp.on("PageLoad", function(data) {
            if (data && data.EntityId && data.EntityId.length > 0) {
                currentContactId = data.EntityId[0];
                loadConversations(currentContactId);
            } else {
                document.getElementById('chats-list').innerHTML = `<div class="p-4 text-red-500">Could not identify Contact context ID.</div>`;
            }
        });

        ZOHO.embeddedApp.init();

        // 1. Fetch all Conversations related to the current Contact
        function loadConversations(contactId) {
            const chatListDiv = document.getElementById('chats-list');
            
            // Build the COQL query using updated API names
            const query = `select id, Name, Modified_Time from ${CONFIG.CONVERSATIONS_MODULE} where ${CONFIG.CONTACTS_LOOKUP_IN_CONV} = ${contactId} order by Modified_Time desc`;
            
            ZOHO.CRM.API.coql({ select_query: query })
                .then(function(response) {
                    chatListDiv.innerHTML = "";
                    if (!response || !response.data || response.data.length === 0) {
                        chatListDiv.innerHTML = `<div class="p-4 text-center text-gray-400">No active conversations found for this contact.</div>`;
                        return;
                    }

                    response.data.forEach(chat => {
                        const dateStr = chat.Modified_Time ? new Date(chat.Modified_Time).toLocaleDateString() : '';
                        const chatEl = document.createElement('div');
                        chatEl.className = "flex items-center justify-between p-4 border-b border-[#f0f2f5] hover:bg-[#f0f2f5] cursor-pointer transition";
                        chatEl.onclick = () => selectConversation(chat.id, chat.Name);
                        chatEl.innerHTML = `
                            <div class="flex-1 min-w-0">
                                <p class="font-medium text-[#111b21] truncate">${chat.Name}</p>
                                <p class="text-[10px] text-gray-400">ID: ${chat.id}</p>
                            </div>
                            <span class="text-xs text-gray-400 ml-2 whitespace-nowrap">${dateStr}</span>
                        `;
                        chatListDiv.appendChild(chatEl);
                    });
                })
                .catch(err => {
                    console.error("Error loading conversations", err);
                    showDiagnosticError(chatListDiv, "Conversations (CustomModule1)", err, query);
                });
        }

        // 2. Fetch and render messages for the active conversation
        function selectConversation(conversationId, name) {
            document.getElementById('active-chat-name').innerText = name;
            document.getElementById('active-chat-status').innerText = "Retrieving chat records...";
            const messageContainer = document.getElementById('message-container');
            messageContainer.innerHTML = `<div class="m-auto text-gray-500">Retrieving messages...</div>`;

            // Query messages
            const query = `select id, Message_ID, Direction, Message_Body, Created_Time from ${CONFIG.MESSAGES_MODULE} where ${CONFIG.CONV_LOOKUP_IN_MSG} = ${conversationId} order by Created_Time asc`;
            
            ZOHO.CRM.API.coql({ select_query: query })
                .then(function(response) {
                    messageContainer.innerHTML = "";
                    document.getElementById('active-chat-status').innerText = "";

                    if (!response || !response.data || response.data.length === 0) {
                        messageContainer.innerHTML = `<div class="m-auto text-gray-400">No messages in this chat.</div>`;
                        return;
                    }

                    response.data.forEach(msg => {
                        const isIncoming = String(msg.Direction).toLowerCase().includes('in'); 
                        const bubbleWrapper = document.createElement('div');
                        bubbleWrapper.className = `flex w-full ${isIncoming ? 'justify-start' : 'justify-end'}`;

                        const bubble = document.createElement('div');
                        bubble.className = `max-w-[70%] rounded-lg px-3 py-2 shadow-sm text-sm relative flex flex-col ${
                            isIncoming 
                                ? 'bg-white text-[#111b21] rounded-tl-none' 
                                : 'bg-[#d9fdd3] text-[#111b21] rounded-tr-none'
                        }`;

                        let contentHtml = `<p class="whitespace-pre-wrap break-words leading-relaxed">${msg.Message_Body || ""}</p>`;
                        
                        const timeStr = msg.Created_Time ? new Date(msg.Created_Time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                        contentHtml += `
                            <span class="text-[10px] text-gray-500 self-end mt-1 select-none whitespace-nowrap">
                                ${timeStr}
                            </span>
                        `;

                        bubble.innerHTML = contentHtml;
                        bubbleWrapper.appendChild(bubble);
                        messageContainer.appendChild(bubbleWrapper);
                    });

                    messageContainer.scrollTop = messageContainer.scrollHeight;
                })
                .catch(err => {
                    console.error("Error loading messages", err);
                    showDiagnosticError(messageContainer, "Messages (CustomModule2)", err, query);
                });
        }

        // Helper to output visual errors in case of API name mismatches
        function showDiagnosticError(targetElement, contextName, errorObj, attemptedQuery) {
            targetElement.innerHTML = `
                <div class="p-4 m-2 bg-red-50 border border-red-200 rounded-lg text-red-700 text-xs">
                    <p class="font-bold text-sm mb-1">⚠️ API Error in ${contextName}</p>
                    <p class="mb-2">This is usually caused by a field API Name mismatch in Zoho CRM.</p>
                    <p class="font-semibold mt-2">Error Details:</p>
                    <pre class="bg-red-100 p-2 rounded overflow-auto max-h-32 font-mono text-[10px]">${JSON.stringify(errorObj, null, 2)}</pre>
                    <p class="font-semibold mt-2">Attempted Query:</p>
                    <pre class="bg-gray-100 p-2 rounded overflow-auto font-mono text-[10px] text-gray-600 whitespace-pre-wrap">${attemptedQuery}</pre>
                </div>`;
        }
    </script>
</body>
</html>
